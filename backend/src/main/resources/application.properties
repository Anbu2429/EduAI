spring.application.name=backend-java
# Server Port
server.port=8080

# MySQL Database Connection (Creates the DB automatically if missing)
spring.datasource.url=jdbc:mysql://localhost:3306/eduai_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=anbu2429
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Settings (Creates and updates tables based on your Java models)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload Folder
file.upload-dir=uploads/profile/students